*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#080c18;font-family:'Outfit',sans-serif;touch-action:none;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none}

.ov.h{display:none!important}

.hud-wave{font-family:'Bebas Neue',sans-serif;font-size:18px;color:rgba(255,255,255,0.6)}

const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let W,H,dpr,state='start',g={},best=parseInt(localStorage.getItem('mvdef3_best')||'0')||0,fingerX=null,lastShot=0;

function resize(){dpr=window.devicePixelRatio||1;W=Math.min(window.innerWidth,480);H=window.innerHeight;canvas.width=W*dpr;canvas.height=H*dpr;canvas.style.width=W+'px';canvas.style.height=H+'px';ctx.setTransform(dpr,0,0,dpr,0,0);}

function initGame(){
  g={px:W/2,py:H-80,bullets:[],enemies:[],powerups:[],particles:[],floats:[],
    score:0,lives:3,wave:1,waveKills:0,waveTarget:10,eSpeed:1.1,spawnRate:70,
    combo:0,maxCombo:0,doubleShot:false,doubleShotT:0,shakeT:0,waveAnnT:100,
    puAnnT:0,puAnnTxt:'',bossAnnT:0,bossAnnName:'',stars:[],time:0,holmBob:0,countdown:180,countdownActive:true,
    bossActive:false,bossDefeated:[],bossWarning:0,victoryFlash:0};
  for(let i=0;i<70;i++)g.stars.push({x:Math.random()*W,y:Math.random()*H,s:Math.random()*2+0.5,sp:Math.random()*0.4+0.1,b:Math.random()*0.5+0.3});
}

// ===== SPAWNING =====
function spawnEnemy(){
  const t=OBJ_TYPES[Math.floor(Math.random()*OBJ_TYPES.length)];
  const sz=t.size;const x=Math.random()*(W-sz-16)+8;
  const hp=1+Math.floor(g.wave/5);
  g.enemies.push({x,y:-sz,w:sz,h:sz,speed:g.eSpeed*(0.8+Math.random()*0.4),
    wobble:Math.random()*1.5-0.75,wobbleP:Math.random()*6.28,spin:0,
    ...t,hp,maxHp:hp,flash:0,isBoss:false});
  g.waveKills++;
}

function spawnBoss(bossData){
  const sz=75;
  g.enemies.push({x:W/2-sz/2,y:-sz-20,w:sz,h:sz,speed:0.8,
    wobble:1.5,wobbleP:0,spin:0,type:'boss',
    color:bossData.color,label:bossData.name,
    bossData:bossData,
    hp:bossData.hp,maxHp:bossData.hp,flash:0,isBoss:true,
    bossStage:0, // current descent stage
    bossStageY:60, // target Y for current stage
    bossStageTimer:0, // frames spent on current stage
    bossStageMax:260, // frames per stage before descending (~3 sec)
    bossSpawnTimer:0 // timer for spawning mini enemies
  });
  g.bossActive=true;
  g.bossAnnT=90;g.bossAnnName=bossData.name+': '+bossData.title;
  g.bossWarning=30; // red flash frames
}

function spawnPU(x,y){const p=POWERUPS[Math.floor(Math.random()*POWERUPS.length)];g.powerups.push({x:x-30,y,w:64,h:26,speed:1.5,...p,glow:0});}
function shoot(){const now=Date.now();if(now-lastShot<260)return;lastShot=now;if(g.doubleShot){g.bullets.push({x:g.px-12,y:g.py-25,sp:9});g.bullets.push({x:g.px+12,y:g.py-25,sp:9});}else{g.bullets.push({x:g.px,y:g.py-25,sp:9});}}
function pts(x,y,col,n=8){for(let i=0;i<n;i++){const a=(Math.PI*2/n)*i+Math.random()*0.5,s=1.5+Math.random()*3;g.particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,decay:0.02+Math.random()*0.02,size:2+Math.random()*4,color:col});}}
function flt(x,y,txt,col='#fff'){g.floats.push({x,y,txt,col,life:1,vy:-1.5});}

// ===== UPDATE =====
function update(){
  if(state!=='playing')return;
  // Countdown at start
  if(g.countdownActive){
    g.countdown--;
    if(g.countdown<=0){g.countdownActive=false;}
    // Bob Holm during countdown
    g.holmBob=Math.sin(Date.now()*0.005)*3;
    return;
  }
  g.time++;g.holmBob=Math.sin(g.time*0.08)*3;
  if(fingerX!==null){const dx=fingerX-g.px;g.px+=Math.min(Math.abs(dx),8)*Math.sign(dx);}
  g.px=Math.max(25,Math.min(W-25,g.px));shoot();

  // Spawn normal enemies (not during boss)
  if(!g.bossActive&&g.time%Math.max(24,g.spawnRate)===0&&g.waveKills<g.waveTarget)spawnEnemy();

  g.bullets.forEach(b=>b.y-=b.sp);g.bullets=g.bullets.filter(b=>b.y>-20);
  g.enemies.forEach(e=>{
    e.y+=e.speed;e.wobbleP+=0.03;e.x+=Math.sin(e.wobbleP)*e.wobble;
    e.spin+=0.04;if(e.flash>0)e.flash--;
    // Boss: stage-based descent + spawns mini enemies
    if(e.isBoss){
      // Descend to current stage target Y
      if(e.y<e.bossStageY){e.speed=0.8;}
      else{e.y=e.bossStageY;e.speed=0;
        e.bossStageTimer++;
        // After staying on stage for a while, drop to next stage
        if(e.bossStageTimer>=e.bossStageMax){
          e.bossStage++;e.bossStageTimer=0;
          e.bossStageY=Math.min(H-160, 60+e.bossStage*55);
          e.speed=0.8;e.wobble*=1.1; // gets faster sideways each stage
          flt(e.x+e.w/2,e.y-15,'Stufe '+(e.bossStage+1)+'!','#E3000F');
        }
      }
      // Bounce off walls
      if(e.x<8){e.x=8;e.wobble=Math.abs(e.wobble);}
      if(e.x+e.w>W-8){e.x=W-e.w-8;e.wobble=-Math.abs(e.wobble);}
      // Spawn mini enemies every ~120 frames (not during announce)
      e.bossSpawnTimer++;
      if(e.bossSpawnTimer>=180&&!e.speed&&g.bossAnnT<=0){
        e.bossSpawnTimer=0;
        const t=OBJ_TYPES[Math.floor(Math.random()*OBJ_TYPES.length)];
        const sz=t.size;
        g.enemies.push({x:e.x+e.w/2-sz/2,y:e.y+e.h,w:sz,h:sz,speed:1.5,
          wobble:Math.random()*2-1,wobbleP:Math.random()*6.28,spin:0,
          ...t,hp:1,maxHp:1,flash:0,isBoss:false});
      }
    }
  });
  g.powerups.forEach(p=>{p.y+=p.speed;p.glow=(p.glow+0.05)%(Math.PI*2);});

  // Bullet-enemy collision
  for(let bi=g.bullets.length-1;bi>=0;bi--){const b=g.bullets[bi];
    for(let ei=g.enemies.length-1;ei>=0;ei--){const e=g.enemies[ei];
      if(b.x>e.x-4&&b.x<e.x+e.w+4&&b.y>e.y-4&&b.y<e.y+e.h+4){
        g.bullets.splice(bi,1);e.hp--;e.flash=6;
        if(e.hp<=0){
          g.combo++;if(g.combo>g.maxCombo)g.maxCombo=g.combo;
          const p=e.isBoss?100+g.wave*20:10*(1+Math.floor(g.combo/5));g.score+=p;
          if(e.isBoss){flt(e.x+e.w/2,e.y,'ABGEWAHLT!','#ffcc00');flt(e.x+e.w/2,e.y-20,'+'+p,'#00c853');g.bossActive=false;g.bossDefeated.push(e.label);g.shakeT=20;g.bossWarning=0;g.lives=Math.min(g.lives+1,5);flt(e.x+e.w/2,e.y+30,'+1 LEBEN','#ff69b4');
            // Epic explosion - 3 waves of particles
            for(let wave=0;wave<3;wave++){setTimeout(()=>{pts(e.x+e.w/2+(Math.random()-0.5)*30,e.y+e.h/2+(Math.random()-0.5)*30,e.color,15);},wave*100);}
            // Green victory flash
            g.victoryFlash=20;}
          else{const kt=Math.random()<0.4?KILL_LINES[Math.floor(Math.random()*KILL_LINES.length)]:'+'+p;flt(e.x+e.w/2,e.y,kt,Math.random()<0.4?'#ffcc00':'#009EE0');}
          pts(e.x+e.w/2,e.y+e.h/2,e.color,e.isBoss?20:10);
          if(Math.random()<(e.isBoss?1.0:0.09+g.wave*0.006))spawnPU(e.x+e.w/2,e.y);
          g.enemies.splice(ei,1);
        }else{pts(b.x,b.y,e.isBoss?e.color:'#fff',4);if(e.isBoss&&Math.random()<0.2)flt(e.x+e.w/2,e.y-10,Math.floor(e.hp)+' HP','rgba(255,255,255,0.5)');}break;}}}

  // Player-enemy collision
  const PR=22;
  for(let ei=g.enemies.length-1;ei>=0;ei--){const e=g.enemies[ei];
    if(e.y+e.h>g.py-PR&&e.y<g.py+PR&&e.x+e.w>g.px-PR&&e.x<g.px+PR){
      g.lives--;g.combo=0;g.shakeT=12;
      if(!e.isBoss)g.enemies.splice(ei,1);
      pts(g.px,g.py,'#E3000F',12);if(g.lives<=0)die();}
    if(!e.isBoss&&e.y>H+20){g.enemies.splice(ei,1);g.combo=0;}}

  // Player-powerup collision
  for(let pi=g.powerups.length-1;pi>=0;pi--){const p=g.powerups[pi];
    if(p.y+p.h>g.py-PR&&p.y<g.py+PR&&p.x+p.w>g.px-PR&&p.x<g.px+PR){
      if(p.type==='direkt'){g.enemies.filter(e=>!e.isBoss).forEach(e=>{pts(e.x+e.w/2,e.y+e.h/2,'#00c853',6);g.score+=10;});g.enemies=g.enemies.filter(e=>e.isBoss);g.shakeT=8;g.puAnnTxt='DIREKTMANDAT!';}
      else if(p.type==='doppel'){g.doubleShot=true;g.doubleShotT=500;g.puAnnTxt='ZWEITSTIMME!';}
      else{g.lives=Math.min(g.lives+1,5);g.puAnnTxt='VOLKSNAEHE!';}
      g.puAnnT=70;pts(p.x+p.w/2,p.y+p.h/2,p.color,10);g.powerups.splice(pi,1);}
    if(p.y>H+20)g.powerups.splice(pi,1);}

  // Timers
  if(g.doubleShotT>0){g.doubleShotT--;if(!g.doubleShotT)g.doubleShot=false;}
  if(g.shakeT>0)g.shakeT--;if(g.waveAnnT>0)g.waveAnnT--;if(g.puAnnT>0)g.puAnnT--;if(g.bossAnnT>0)g.bossAnnT--;if(g.bossWarning>0)g.bossWarning--;if(g.victoryFlash>0)g.victoryFlash--;
  g.particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.05;p.life-=p.decay;});g.particles=g.particles.filter(p=>p.life>0);
  g.floats.forEach(f=>{f.y+=f.vy;f.life-=0.015;});g.floats=g.floats.filter(f=>f.life>0);
  g.stars.forEach(s=>{s.y+=s.sp;if(s.y>H){s.y=0;s.x=Math.random()*W;}});

  // Wave progression
  if(g.waveKills>=g.waveTarget&&g.enemies.length===0&&!g.bossActive){
    // Check if this wave should have a boss
    const bossData=BOSSES.find(b=>b.wave===g.wave&&!g.bossDefeated.includes(b.name));
    if(bossData){spawnBoss(bossData);return;}
    g.wave++;g.waveKills=0;g.waveTarget=Math.floor(6+g.wave*1.8);
    g.eSpeed=1.1+g.wave*0.08;g.spawnRate=Math.max(35,90-g.wave*5);
    g.score+=g.wave*25;g.lives=Math.min(g.lives+1,5);
    const wb=['Welle geschafft!','MV dankt!','Schwesine zittert!','Blau marschiert!','Weiter!','Stark!'];
    flt(W/2,H/2,wb[Math.min(g.wave-2,wb.length-1)],'#ffcc00');g.waveAnnT=100;
  }
  // Boss defeated = advance wave
  if(g.waveKills>=g.waveTarget&&!g.bossActive&&g.enemies.length===0){
    g.wave++;g.waveKills=0;g.waveTarget=Math.floor(6+g.wave*1.8);
    g.eSpeed=1.1+g.wave*0.08;g.spawnRate=Math.max(35,90-g.wave*5);
    g.score+=g.wave*50;flt(W/2,H/2,'BOSS ABGEWAHLT! +'+g.wave*50,'#ffcc00');g.waveAnnT=100;
  }

  document.getElementById('hudScore').textContent=g.score;document.getElementById('hudWave').textContent='WELLE '+g.wave;
  let h='';for(let i=0;i<g.lives;i++)h+='\u2764\uFE0F';document.getElementById('hudLives').textContent=h;
}

function die(){state='dead';if(g.score>best){best=g.score;try{localStorage.setItem('mvdef3_best',best)}catch(e){}}setTimeout(showGO,600);}

// ===== DRAW =====
function draw(){
  ctx.save();if(g.shakeT>0)ctx.translate((Math.random()-0.5)*g.shakeT*0.7,(Math.random()-0.5)*g.shakeT*0.7);
  const bg=ctx.createLinearGradient(0,0,0,H);bg.addColorStop(0,'#080c18');bg.addColorStop(0.5,'#0d1a30');bg.addColorStop(1,'#080c18');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  if(g.stars)g.stars.forEach(s=>{ctx.globalAlpha=s.b*(0.5+0.5*Math.sin(g.time*0.02+s.x));ctx.fillStyle='#fff';ctx.fillRect(s.x,s.y,s.s,s.s);});ctx.globalAlpha=1;

  // Bullets
  g.bullets.forEach(b=>{ctx.save();ctx.shadowColor='#009EE0';ctx.shadowBlur=8;ctx.fillStyle='#009EE0';ctx.fillRect(b.x-3,b.y-6,6,12);ctx.fillStyle='#fff';ctx.font='bold 8px Outfit';ctx.textAlign='center';ctx.fillText('X',b.x,b.y+3);ctx.restore();});

  // ===== DRAW ENEMIES =====
  g.enemies.forEach(e=>{
    ctx.save();const cx=e.x+e.w/2,cy=e.y+e.h/2;const fl=e.flash>0;
    if(fl){ctx.shadowColor='#fff';ctx.shadowBlur=15;}else{ctx.shadowColor=e.color;ctx.shadowBlur=6;}

    if(e.isBoss) drawBoss(e,cx,cy,fl);
    else if(e.type==='windmill') drawWindmill(e,cx,cy,fl);
    else if(e.type==='envelope') drawEnvelope(e,cx,cy,fl);
    else if(e.type==='folder') drawFolder(e,cx,cy,fl);
    else if(e.type==='brick') drawBrick(e,cx,cy,fl);
    else if(e.type==='megaphone') drawMegaphone(e,cx,cy,fl);
    else if(e.type==='form') drawForm(e,cx,cy,fl);
    else if(e.type==='sign') drawSign(e,cx,cy,fl);

    // HP bar for multi-hp enemies
    if(e.maxHp>1){ctx.shadowBlur=0;ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(e.x,e.y+e.h+2,e.w,4);
      ctx.fillStyle=e.isBoss?'#E3000F':e.hp/e.maxHp>0.5?'#00c853':'#ffcc00';ctx.fillRect(e.x,e.y+e.h+2,e.w*(e.hp/e.maxHp),4);}
    // Label under enemy
    ctx.shadowBlur=0;ctx.fillStyle='rgba(255,255,255,0.7)';ctx.font='600 8px Outfit';ctx.textAlign='center';
    ctx.fillText(e.label,cx,e.y+e.h+(e.maxHp>1?10:4));
    ctx.restore();
  });

  // Powerups
  g.powerups.forEach(p=>{ctx.save();const gi=0.5+0.5*Math.sin(p.glow);ctx.shadowColor=p.color;ctx.shadowBlur=8+gi*8;ctx.fillStyle=p.color;ctx.globalAlpha=0.85+gi*0.15;rr(ctx,p.x,p.y,p.w,p.h,5);ctx.fill();ctx.fillStyle='#000';ctx.font='700 9px Outfit';ctx.textAlign='center';ctx.globalAlpha=1;ctx.fillText(p.label,p.x+p.w/2,p.y+17);ctx.restore();});

  // Holm
  drawHolm(g.px,g.py+(g.holmBob||0));

  // Particles & floats
  g.particles.forEach(p=>{ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);ctx.fill();});ctx.globalAlpha=1;
  g.floats.forEach(f=>{ctx.globalAlpha=f.life;ctx.fillStyle=f.col;ctx.font='800 15px Outfit';ctx.textAlign='center';ctx.shadowColor=f.col;ctx.shadowBlur=6;ctx.fillText(f.txt,f.x,f.y);ctx.shadowBlur=0;});ctx.globalAlpha=1;

  // Wave announce
  if(g.waveAnnT>0){const a=g.waveAnnT>70?(100-g.waveAnnT)/30:g.waveAnnT<25?g.waveAnnT/25:1;ctx.globalAlpha=a;ctx.fillStyle='#009EE0';ctx.font='44px "Bebas Neue"';ctx.textAlign='center';ctx.shadowColor='#009EE0';ctx.shadowBlur=25;ctx.fillText('WELLE '+g.wave,W/2,H/2-15);ctx.shadowBlur=0;ctx.font='600 14px Outfit';ctx.fillStyle='rgba(255,255,255,0.6)';ctx.fillText(g.wave===1?'Schwerin, wir kommen!':g.wave===2?'Die SPD wird nervos!':g.wave===3?'Schwesine schwitzt!':g.wave===4?'Die Brandmauer wackelt!':g.wave===5?'Petersen ruft an!':g.wave===6?'Die Linke packt ein!':g.wave===7?'NDR berichtet ungern!':g.wave<=10?'MV wird blau!':'Alleinregierung!',W/2,H/2+15);ctx.globalAlpha=1;}
  // Boss announce (dramatic WARNING)
  if(g.bossAnnT>0){const a=g.bossAnnT>60?(90-g.bossAnnT)/30:g.bossAnnT<20?g.bossAnnT/20:1;ctx.globalAlpha=a;
    // WARNING flash
    ctx.fillStyle='#E3000F';ctx.font='900 32px "Bebas Neue"';ctx.textAlign='center';ctx.shadowColor='#E3000F';ctx.shadowBlur=30;
    ctx.fillText('GEGNERKANDIDAT NAHT!',W/2,H*0.2);
    // Boss name
    ctx.font='700 18px Outfit';ctx.fillStyle='#fff';ctx.shadowBlur=15;
    ctx.fillText(g.bossAnnName,W/2,H*0.2+30);
    ctx.shadowBlur=0;ctx.globalAlpha=1;}
  // PU announce
  if(g.puAnnT>0){const a=g.puAnnT>50?(70-g.puAnnT)/20:g.puAnnT<15?g.puAnnT/15:1;ctx.globalAlpha=a;ctx.fillStyle='#00c853';ctx.font='700 20px Outfit';ctx.textAlign='center';ctx.shadowColor='#00c853';ctx.shadowBlur=15;ctx.fillText(g.puAnnTxt,W/2,H*0.3);ctx.shadowBlur=0;ctx.globalAlpha=1;}
  // Combo
  if(g.combo>=3){ctx.fillStyle='#ffcc00';ctx.font='700 12px Outfit';ctx.textAlign='left';ctx.fillText((g.combo>=15?g.combo+'x UNAUFHALTBAR':g.combo>=10?g.combo+'x POLITIKWECHSEL':g.combo>=7?g.combo+'x AUF FEUER':g.combo+'x COMBO'),12,H-20);}

  // === COUNTDOWN ===
  if(g.countdownActive&&g.countdown>0){
    const sec=Math.ceil(g.countdown/60);
    const frac=(g.countdown%60)/60;
    const scale=1+frac*0.5;
    ctx.globalAlpha=0.8+frac*0.2;
    ctx.fillStyle=sec>=3?'#009EE0':sec===2?'#ffcc00':'#00c853';
    ctx.font=(80*scale)+'px "Bebas Neue"';ctx.textAlign='center';
    ctx.shadowColor=ctx.fillStyle;ctx.shadowBlur=30;
    const txt=sec>=1?sec.toString():'LOS!';
    ctx.fillText(txt,W/2,H/2+20);
    ctx.shadowBlur=0;ctx.globalAlpha=1;
    // Subtitle
    ctx.fillStyle='rgba(255,255,255,0.5)';ctx.font='600 16px Outfit';
    ctx.fillText(sec>=3?'Bereit machen...':sec===2?'Gleich gehts los...':sec===1?'JETZT!':'',W/2,H/2+55);
  }

  // === BOSS WARNING FLASH (red screen pulse when boss spawns) ===
  if(g.bossWarning>0){
    ctx.globalAlpha=g.bossWarning/30*0.35;ctx.fillStyle='#E3000F';ctx.fillRect(0,0,W,H);ctx.globalAlpha=1;
  }
  // === VICTORY FLASH (green pulse when boss defeated) ===
  if(g.victoryFlash>0){
    ctx.globalAlpha=g.victoryFlash/20*0.3;ctx.fillStyle='#00c853';ctx.fillRect(0,0,W,H);ctx.globalAlpha=1;
  }

  // === RED VIGNETTE during boss fight ===
  if(g.bossActive){
    const vg=ctx.createRadialGradient(W/2,H/2,H*0.3,W/2,H/2,H*0.7);
    vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(200,0,0,0.12)');
    ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);
  }

  // === BOSS HP BAR (big bar at top of screen) ===
  if(g.bossActive){
    const boss=g.enemies.find(e=>e.isBoss);
    if(boss){
      const barW=W-40,barH=10,barX=20,barY=42;
      const hpPct=boss.hp/boss.maxHp;
      // Background
      ctx.fillStyle='rgba(0,0,0,0.5)';rr(ctx,barX-2,barY-2,barW+4,barH+4,6);ctx.fill();
      // Empty bar
      ctx.fillStyle='rgba(255,255,255,0.08)';rr(ctx,barX,barY,barW,barH,4);ctx.fill();
      // HP fill (red, pulses when low)
      const hpCol=hpPct>0.5?boss.color:hpPct>0.25?'#ff6600':'#ff0000';
      const pulse=hpPct<0.25?0.7+0.3*Math.sin(g.time*0.15):1;
      ctx.globalAlpha=pulse;ctx.fillStyle=hpCol;rr(ctx,barX,barY,barW*hpPct,barH,4);ctx.fill();ctx.globalAlpha=1;
      // Boss name on bar
      ctx.fillStyle='#fff';ctx.font='700 9px Outfit';ctx.textAlign='center';
      ctx.fillText(boss.label+' — '+Math.ceil(hpPct*100)+'%',W/2,barY+8);
      // Stage indicator dots
      const stages=Math.floor((H-160-60)/55)+1;
      for(let i=0;i<stages;i++){
        ctx.fillStyle=i<=boss.bossStage?'#E3000F':'rgba(255,255,255,0.15)';
        ctx.beginPath();ctx.arc(barX+8+i*12,barY+barH+8,3,0,Math.PI*2);ctx.fill();
      }
    }
  }
  ctx.restore();
}

// ===== OBJECT DRAWING =====
function drawWindmill(e,cx,cy,fl){
  ctx.translate(cx,cy);ctx.rotate(e.spin);
  ctx.fillStyle=fl?'#fff':e.color;
  for(let i=0;i<3;i++){ctx.save();ctx.rotate(i*Math.PI*2/3);
    ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(-5,-e.w/2+2);ctx.lineTo(5,-e.w/2+2);ctx.closePath();ctx.fill();ctx.restore();}
  ctx.fillStyle=fl?'#ddd':'#fff';ctx.beginPath();ctx.arc(0,0,5,0,Math.PI*2);ctx.fill();
  ctx.setTransform(dpr,0,0,dpr,0,0);
}

function drawEnvelope(e,cx,cy,fl){
  const w=e.w,h=e.h*0.7;ctx.fillStyle=fl?'#fff':'#dde8f8';
  ctx.fillRect(cx-w/2,cy-h/2,w,h);ctx.strokeStyle=fl?'#aaa':e.color;ctx.lineWidth=2;ctx.strokeRect(cx-w/2,cy-h/2,w,h);
  ctx.beginPath();ctx.moveTo(cx-w/2,cy-h/2);ctx.lineTo(cx,cy+2);ctx.lineTo(cx+w/2,cy-h/2);ctx.strokeStyle=fl?'#aaa':e.color;ctx.lineWidth=1.5;ctx.stroke();
  ctx.fillStyle=fl?'#888':e.color;ctx.font='bold 8px Outfit';ctx.textAlign='center';ctx.fillText('GEZ',cx,cy+4);
}

function drawFolder(e,cx,cy,fl){
  const w=e.w*0.85,h=e.h*0.7;
  ctx.fillStyle=fl?'#fff':e.color;rr(ctx,cx-w/2,cy-h/2,w,h,4);ctx.fill();
  ctx.fillStyle=fl?'#ddd':'rgba(0,0,0,0.15)';ctx.fillRect(cx-w/2,cy-h/2,w,h*0.25);
  ctx.fillStyle=fl?'#ccc':'rgba(255,255,255,0.25)';ctx.fillRect(cx-w/4,cy-h/2+3,w/2,3);
  ctx.fillStyle='rgba(255,255,255,0.5)';ctx.font='bold 7px Outfit';ctx.textAlign='center';ctx.fillText('SPD',cx,cy+5);
}

function drawBrick(e,cx,cy,fl){
  const w=e.w,h=e.h*0.55;
  ctx.fillStyle=fl?'#fff':'#888';rr(ctx,cx-w/2,cy-h/2,w,h,3);ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,0.2)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(cx,cy-h/2);ctx.lineTo(cx,cy+h/2);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx-w/2,cy);ctx.lineTo(cx+w/2,cy);ctx.stroke();
  ctx.fillStyle=fl?'#aaa':'rgba(255,255,255,0.3)';ctx.font='bold 6px Outfit';ctx.textAlign='center';ctx.fillText('CDU',cx,cy+3);
}

function drawMegaphone(e,cx,cy,fl){
  ctx.translate(cx,cy);ctx.rotate(-0.3);
  ctx.fillStyle=fl?'#fff':e.color;ctx.beginPath();ctx.moveTo(-12,0);ctx.lineTo(12,-10);ctx.lineTo(12,10);ctx.closePath();ctx.fill();
  ctx.fillStyle=fl?'#ddd':'rgba(255,255,255,0.3)';ctx.fillRect(-15,-3,6,6);
  ctx.setTransform(dpr,0,0,dpr,0,0);
}

function drawForm(e,cx,cy,fl){
  const w=e.w*0.7,h=e.h*0.85;
  ctx.fillStyle=fl?'#fff':'#e8e8e8';ctx.fillRect(cx-w/2,cy-h/2,w,h);
  ctx.strokeStyle=fl?'#aaa':e.color;ctx.lineWidth=1.5;ctx.strokeRect(cx-w/2,cy-h/2,w,h);
  ctx.fillStyle='rgba(100,100,100,0.3)';
  for(let i=0;i<4;i++)ctx.fillRect(cx-w/2+4,cy-h/2+5+i*5,w-8,2);
  ctx.fillStyle=fl?'#888':'#c00';ctx.font='bold 9px Outfit';ctx.textAlign='center';ctx.fillText('X',cx+w/4,cy+h/4);
}

function drawSign(e,cx,cy,fl){
  const r=e.w/2-2;ctx.fillStyle=fl?'#fff':e.color;ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=fl?'#eee':'#fff';ctx.beginPath();ctx.arc(cx,cy,r-4,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle=fl?'#aaa':e.color;ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(cx-r+8,cy+r-8);ctx.lineTo(cx+r-8,cy-r+8);ctx.stroke();
}

// ===== BOSS DRAWING (politician cartoon heads) =====
function drawBoss(e,cx,cy,fl){
  const bd=e.bossData,sz=e.w/2;
  // Glow ring (pulsing)
  ctx.strokeStyle=e.color;ctx.lineWidth=3;ctx.globalAlpha=0.3+0.25*Math.sin(g.time*0.1);
  ctx.beginPath();ctx.arc(cx,cy,sz+10,0,Math.PI*2);ctx.stroke();ctx.globalAlpha=1;
  // Second ring
  ctx.strokeStyle=e.color;ctx.lineWidth=1.5;ctx.globalAlpha=0.15+0.15*Math.sin(g.time*0.15+1);
  ctx.beginPath();ctx.arc(cx,cy,sz+18,0,Math.PI*2);ctx.stroke();ctx.globalAlpha=1;
  // Flash overlay
  if(fl){ctx.fillStyle='rgba(255,255,255,0.6)';ctx.beginPath();ctx.arc(cx,cy,sz+4,0,Math.PI*2);ctx.fill();}
  // Draw sprite if loaded
  const bImg=bossImgs[e.label];
  if(bImg){
    const iw=e.w+10,ih=iw*(bImg.height/bImg.width);
    ctx.drawImage(bImg,cx-iw/2,cy-ih/2,iw,ih);
  }else{
    // Fallback circle
    ctx.fillStyle=e.color;ctx.beginPath();ctx.arc(cx,cy,sz,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.font='bold 16px Outfit';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(e.label[0],cx,cy);ctx.textBaseline='alphabetic';
  }
}

// ===== HOLM =====
function drawHolm(x,y){
  ctx.save();ctx.translate(x,y);
  if(holmReady){const w=48,h=64;ctx.shadowColor='#009EE0';ctx.shadowBlur=12;ctx.drawImage(holmImg,-w/2,-h/2,w,h);ctx.shadowBlur=0;
    if(g.doubleShot){ctx.fillStyle='#ffcc00';ctx.globalAlpha=0.7+0.3*Math.sin(g.time*0.15);ctx.beginPath();ctx.arc(-28,10,3.5,0,Math.PI*2);ctx.arc(28,10,3.5,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;}
  }else{ctx.fillStyle='#009EE0';ctx.beginPath();ctx.arc(0,0,22,0,Math.PI*2);ctx.fill();ctx.fillStyle='#fff';ctx.font='bold 14px Outfit';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('LH',0,0);ctx.textBaseline='alphabetic';}
  ctx.restore();
}

function rr(c,x,y,w,h,r){c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);c.closePath();}

canvas.addEventListener('touchstart',e=>{e.preventDefault();fingerX=e.touches[0].clientX;},{passive:false});
canvas.addEventListener('touchmove',e=>{e.preventDefault();fingerX=e.touches[0].clientX;},{passive:false});
canvas.addEventListener('touchend',e=>{e.preventDefault();fingerX=null;},{passive:false});
let md=false;canvas.addEventListener('mousedown',e=>{md=true;fingerX=e.clientX;});document.addEventListener('mousemove',e=>{if(md)fingerX=e.clientX;});document.addEventListener('mouseup',()=>{md=false;fingerX=null;});
const keys={};document.addEventListener('keydown',e=>{keys[e.key]=true;});document.addEventListener('keyup',e=>{keys[e.key]=false;});
setInterval(()=>{if(state==='playing'){if(keys.ArrowLeft||keys.a)g.px-=7;if(keys.ArrowRight||keys.d)g.px+=7;}},16);
document.getElementById('startScr').addEventListener('touchstart',e=>{e.preventDefault();startGame();},{passive:false});
document.getElementById('startScr').addEventListener('mousedown',()=>startGame());

function startGame(){document.getElementById('startScr').classList.add('h');document.getElementById('goScr').classList.add('h');document.getElementById('hud').classList.add('vis');state='playing';initGame();}

function showGO(){document.getElementById('hud').classList.remove('vis');document.getElementById('goScr').classList.remove('h');
  document.getElementById('goScore').textContent=g.score;document.getElementById('goWave').textContent=g.wave;
  document.getElementById('goCombo').textContent=g.maxCombo+'x';document.getElementById('goBest').textContent=best;
  const s=g.score;const bd=g.bossDefeated;
  document.getElementById('goTitle').textContent=s>=2000?'MINISTERPRASIDENT!':s>=1000?'FRAKTIONSCHEF!':s>=500?'ABGEORDNETER':s>=200?'WAHLHELFER':'PRAKTIKANT';
  let msg=s<100?'Nicht mal die Oma hat dich gewahlt.':s<200?'Immerhin: Teilnehmerurkunde gesichert.':s<500?'Die SPD hatte nach 36 Jahren auch nicht mehr Stimmen.':s<1000?'Petersen ware neidisch.':s<2000?'Schwesine fragt nach Koalition.':'Alleinregierung! Holm ist stolz auf dich!';
  if(bd.length>0)msg+=' Besiegt: '+bd.join(', ')+' abgewahlt.';
  document.getElementById('goMsg').textContent=msg;}

function shareGO(){const rank=g.score>=2000?'Ministerprasident':g.score>=1000?'Fraktionschef':g.score>=500?'Abgeordneter':g.score>=200?'Wahlhelfer':'Praktikant';
  const bd=g.bossDefeated.length>0?' Besiegt: '+g.bossDefeated.join(', ')+'.':'';
  const t='MV Verteidiger 2026\n\nIch bin '+rank+' mit '+g.score+' Stimmen (Welle '+g.wave+')!'+bd+'\n\nDie SPD regiert MV seit 36 Jahren. Ich hab sie in '+g.wave+' Wellen abgewahlt.\n\n#MVVerteidiger #Landtagswahl2026 #MV';
  if(navigator.share)navigator.share({title:'MV Verteidiger 2026',text:t}).catch(()=>cpT(t));else cpT(t);}
function cpT(t){navigator.clipboard.writeText(t).then(()=>{const b=document.getElementById('btnShareGo');b.textContent='KOPIERT!';setTimeout(()=>b.textContent='TEILEN',1800);}).catch(()=>{});}
document.getElementById('btnRetry').addEventListener('click',startGame);
document.getElementById('btnShareGo').addEventListener('click',shareGO);

initGame();function loop(){update();draw();requestAnimationFrame(loop);}loop();
